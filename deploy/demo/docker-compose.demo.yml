# OpenTraderWorld — public demo sandbox stack (hardened).
#
#   cp demo.env.example .env           # fill the few values (all throwaway)
#   docker compose -f docker-compose.demo.yml up -d --build
#   ./reset.sh --init                  # build the otw_seed template once
#   crontab: */15 * * * *  <path>/reset.sh
#
# The .env here is auto-loaded by compose (this directory is the project dir), so no
# --env-file flag is ever needed — bare `docker compose -f docker-compose.demo.yml …`
# commands always see the right values.
#
# Posture (see ProjectSpecs/LiveDemoRunbook.md):
#   - core runs with OTW_DEMO=1 → default-deny route gate + auto-login + quotas.
#   - NO real secrets anywhere: demo.env holds a throwaway PG password, a throwaway
#     OTW_SECRET_KEY and a $0-credit OpenRouter key. Never reuse values from deploy/.env.
#   - Caddy serves plain HTTP on :80; TLS terminates at Cloudflare (origin firewalled to
#     Cloudflare IPs). For Full (strict), add an origin cert and publish 443.
#   - Containers: no new privileges, all capabilities dropped, memory/pid caps.
#     (Postgres/Caddy keep their setuid startup, so no cap_drop there — they already
#     run unprivileged after init.)

name: otw-demo

services:
  caddy:
    image: opentraderworld/otw-caddy:latest
    build:
      context: ../caddy
    restart: unless-stopped
    depends_on:
      core:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    ports:
      # 80 in production (TLS at Cloudflare). Override locally: OTW_DEMO_PORT=8088.
      - "${OTW_DEMO_PORT:-80}:80"
    environment:
      OTW_DOMAIN: ":80"
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 200
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - web-assets:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config

  frontend:
    image: opentraderworld/otw-frontend:latest
    build:
      context: ../../frontend
    volumes:
      - web-assets:/www

  core:
    image: opentraderworld/otw-core:latest
    build:
      context: ../../core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # DATABASE_URL is built from POSTGRES_PASSWORD (interpolated from .env at `docker
    # compose` invocation time). IMPORTANT: postgres only APPLIES POSTGRES_PASSWORD the
    # first time its volume is created — editing .env afterwards changes what `core`
    # sends but not what postgres actually expects, which manifests as `core` stuck
    # "Restarting" with "password authentication failed". `reset.sh` preflights this
    # exact mismatch and prints the fix; see ProjectSpecs/DemoMode.md.
    environment:
      OTW_CORE_HOST: 0.0.0.0
      OTW_CORE_PORT: "8080"
      OTW_UPLOAD_DIR: /data/uploads
      DATABASE_URL: postgres://otw:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres/opentraderworld
      OTW_SECRET_KEY: ${OTW_SECRET_KEY:?set OTW_SECRET_KEY in .env}
      OTW_DEMO_LLM_KEY: ${OTW_DEMO_LLM_KEY:-}
      # Read only by `--seed-demo`, to seal the AlphaVantage feed key into feed_secrets.
      # Unset = that feed stays disabled; the RSS feeds need no credential.
      OTW_DEMO_AV_KEY: ${OTW_DEMO_AV_KEY:-}
      # ── Demo posture ──
      OTW_DEMO: "1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: "1.5"
    pids_limit: 300
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - uploads:/data/uploads
    expose:
      - "8080"

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: otw
      POSTGRES_DB: opentraderworld
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 200
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otw -d opentraderworld"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  web-assets:
  postgres-data:
  caddy-data:
  caddy-config:
  uploads:
