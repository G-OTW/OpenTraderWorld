<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="OpenTraderWorld docs">
  <!-- Concept 1 — Book + chart: teal left page with rising candles, navy right page with text lines. -->

  <!-- Pages -->
  <path d="M16 8.5C12.5 6.6 8.2 6.2 4.5 7.1v17.4c3.7-.9 8-.5 11.5 1.4z"
        fill="#ffffff" stroke="#14a08c" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M16 8.5c3.5-1.9 7.8-2.3 11.5-1.4v17.4c-3.7-.9-8-.5-11.5 1.4z"
        fill="#ffffff" stroke="#1b2a41" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Spine -->
  <line x1="16" y1="8.5" x2="16" y2="25.9" stroke="#1b2a41" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Rising candlesticks (left page) -->
  <g stroke="#16a385" stroke-width="1" stroke-linecap="round">
    <line x1="7.3" y1="15" x2="7.3" y2="21"/>
    <line x1="10" y1="11.8" x2="10" y2="18.5"/>
    <line x1="12.7" y1="9.6" x2="12.7" y2="16"/>
  </g>
  <g fill="#16a385">
    <rect x="6.3" y="16.2" width="2" height="3.4" rx="0.5"/>
    <rect x="9" y="13" width="2" height="4" rx="0.5"/>
    <rect x="11.7" y="10.8" width="2" height="3.7" rx="0.5"/>
  </g>

  <!-- Text lines (right page) -->
  <g stroke="#c9d2dc" stroke-width="1.3" stroke-linecap="round">
    <line x1="19" y1="11.5" x2="25" y2="11"/>
    <line x1="19" y1="14.5" x2="25" y2="14"/>
    <line x1="19" y1="17.5" x2="23.5" y2="17.1"/>
  </g>
</svg>
